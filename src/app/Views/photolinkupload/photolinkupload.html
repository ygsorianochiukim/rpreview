<div class="max-w-3xl mx-auto p-6 bg-white rounded-xl shadow-lg">

  <h2 class="text-2xl font-bold mb-4">Upload Photo Link</h2>

  <form [formGroup]="uploadForm" (ngSubmit)="submit()">

    <div formArrayName="links" class="space-y-3">
      <div *ngFor="let linkCtrl of links.controls; let i = index" class="flex items-center gap-2">
        <input type="text" [formControlName]="i" placeholder="Enter photo link"
               class="flex-1 border rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-400" />
        <button type="button" (click)="removeLink(i)" 
                class="px-3 py-2 bg-red-500 text-white rounded hover:bg-red-600">
          Remove
        </button>
      </div>
    </div>

    <button type="button" (click)="addLink()"
            class="mt-3 px-4 py-2 bg-gray-200 rounded hover:bg-gray-300">
      Add Link
    </button>

    <button type="submit"
            [disabled]="loading"
            class="mt-4 px-6 py-2 bg-blue-500 text-white rounded hover:bg-blue-600">
      Save Links
    </button>

  </form>

  <!-- Display newly saved links -->
  <div *ngIf="savedLinks.length" class="mt-6">
    <h3 class="font-semibold text-gray-800 mb-2">Saved Links:</h3>
    <ul class="list-disc pl-5 text-blue-600">
      <li *ngFor="let link of savedLinks">
        <a [href]="link.link" target="_blank">{{ link.link }}</a>
      </li>
    </ul>
  </div>

  <p *ngIf="message" class="mt-4 text-green-600 font-medium">{{ message }}</p>
  <p *ngIf="error" class="mt-4 text-red-600 font-medium">{{ error }}</p>

  <button (click)="goBack()"
          class="mt-4 px-4 py-2 bg-gray-300 rounded hover:bg-gray-400">
    Back
  </button>

</div>
